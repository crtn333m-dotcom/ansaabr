name: Build APK from zip

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: فك الضغط
        run: unzip -o ansaab-final.zip -d project_src
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: إنشاء مشروع أندرويد كامل
        run: flutter create ansaab_app
      
      - name: نسخ كود الأنساب
        run: |
          cp project_src/pubspec.yaml ansaab_app/pubspec.yaml
          cp -r project_src/lib/* ansaab_app/lib/
      
      - name: بناء APK
        working-directory: ansaab_app
        run: |
          flutter pub get
          flutter build apk --release
      
      - name: رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: ansaab-release-apk
          path: ansaab_app/build/app/outputs/flutter-apk/app-release.apk
